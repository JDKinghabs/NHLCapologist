<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IceCap — NHL Salary Cap Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;500;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  :root {
    --bg: #080c10;
    --bg2: #0d1117;
    --bg3: #131a22;
    --bg4: #1a2330;
    --border: #1e2d3d;
    --border2: #253444;
    --ice: #5bc8f5;
    --ice2: #3aa8d8;
    --ice3: #1a6a99;
    --ice-dim: rgba(91,200,245,0.08);
    --red: #e84545;
    --green: #3ddc84;
    --yellow: #f5c842;
    --text: #e8f4f8;
    --text2: #8aacbe;
    --text3: #4a6b80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #root { position: relative; z-index: 1; }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,16,0.95);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1600px; margin: 0 auto;
    padding: 0 24px;
    display: flex; align-items: center; gap: 20px;
    height: 56px;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 22px;
    letter-spacing: 0.05em;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-ice { color: var(--ice); }
  .logo-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ice);
    box-shadow: 0 0 8px var(--ice);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .header-nav {
    display: flex; gap: 2px; margin-left: auto;
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 6px 14px; border-radius: 3px;
    transition: all 0.15s;
  }
  .nav-btn:hover { color: var(--text); background: var(--bg3); }
  .nav-btn.active { color: var(--ice); background: var(--ice-dim); }

  .season-pill {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--border2);
    padding: 4px 10px; border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--text2);
  }
  .season-select {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 11px; padding: 2px 6px; border-radius: 3px;
    outline: none; cursor: pointer;
  }
  .data-badges {
    display: flex; gap: 8px; align-items: center;
  }
  .data-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--text3);
    border: 1px solid var(--border2);
    padding: 3px 8px; border-radius: 2px;
  }
  .data-badge.ice {
    background: var(--ice-dim);
    border: 1px solid var(--ice3);
    color: var(--ice);
  }
  .data-badge.warn {
    background: rgba(245,200,66,0.12);
    border: 1px solid rgba(245,200,66,0.4);
    color: var(--yellow);
  }
  .data-badge.dim {
    background: rgba(255,255,255,0.03);
    color: var(--text2);
  }

  /* MAIN LAYOUT */
  .main { max-width: 1600px; margin: 0 auto; padding: 24px; }

  /* LEAGUE OVERVIEW BAR */
  .league-bar {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 1px; background: var(--border);
    border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; margin-bottom: 16px;
  }
  .league-stat {
    background: var(--bg2); padding: 16px 20px;
  }
  .league-stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }
  .league-stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 20px; font-weight: 700; color: var(--text);
  }
  .league-stat-val.ice { color: var(--ice); }
  .league-stat-val.red { color: var(--red); }
  .league-stat-val.green { color: var(--green); }
  .league-stat-sub {
    font-size: 11px; color: var(--text3); margin-top: 4px;
  }
  .data-note {
    font-size: 11px; color: var(--text3);
    margin-bottom: 18px;
    display: flex; gap: 10px; align-items: center;
  }
  .sample-banner {
    background: rgba(91,200,245,0.08);
    border: 1px solid rgba(91,200,245,0.3);
    color: var(--ice);
    font-size: 12px; padding: 8px 12px; border-radius: 4px;
    margin-bottom: 16px;
  }

  /* SECTION HEADER */
  .section-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 16px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text);
  }
  .section-line {
    flex: 1; height: 1px; background: var(--border);
  }

  /* FILTERS */
  .filters {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text2); font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 5px 12px; border-radius: 3px;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--ice3); color: var(--text); }
  .filter-btn.active { background: var(--ice-dim); border-color: var(--ice3); color: var(--ice); }
  .search-input {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px;
    padding: 5px 12px; border-radius: 3px; outline: none;
    width: 200px; transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--ice3); }

  /* TEAM GRID */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  /* TEAM CARD */
  .team-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
    cursor: pointer; transition: all 0.2s;
    position: relative; z-index: 2;
  }
  .team-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--team-color, var(--border));
    transition: opacity 0.2s;
  }
  .team-card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .team-card.selected {
    border-color: var(--ice3);
    box-shadow: 0 0 0 1px var(--ice3);
  }
  .card-header {
    padding: 14px 16px 10px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .team-abbr {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900; letter-spacing: -0.02em;
    color: var(--team-color, var(--text));
    min-width: 52px;
  }
  .team-name-block { flex: 1; }
  .team-full-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600; color: var(--text);
    letter-spacing: 0.02em;
  }
  .team-division {
    font-size: 11px; color: var(--text3); margin-top: 1px;
    letter-spacing: 0.04em;
  }
  .cap-space-num {
    font-family: 'Space Mono', monospace;
    font-size: 15px; font-weight: 700; text-align: right;
  }
  .cap-space-label {
    font-size: 10px; color: var(--text3); text-align: right;
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.06em;
    text-transform: uppercase; margin-top: 2px;
  }

  /* CAP BAR */
  .cap-bar-wrap { padding: 10px 16px 14px; }
  .cap-bar-track {
    height: 6px; background: var(--bg4); border-radius: 3px;
    overflow: hidden; margin-bottom: 8px;
  }
  .cap-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .cap-bar-fill.over { background: var(--red); }
  .cap-bar-fill.warning { background: var(--yellow); }
  .cap-bar-fill.ok { background: var(--ice2); }
  .cap-bar-fill.great { background: var(--green); }

  .cap-stats {
    display: flex; justify-content: space-between;
    align-items: center;
  }
  .cap-stat {
    display: flex; flex-direction: column; gap: 1px;
  }
  .cap-stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--text2);
  }
  .cap-stat-lbl {
    font-size: 10px; color: var(--text3);
    font-family: 'Barlow Condensed', sans-serif;
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  /* ROSTER COUNTS */
  .roster-row {
    padding: 0 16px 12px;
    display: flex; gap: 12px;
  }
  .roster-pill {
    font-size: 11px; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; letter-spacing: 0.04em;
    padding: 3px 8px; border-radius: 2px;
    color: var(--text3); background: var(--bg3);
    border: 1px solid var(--border);
  }
  .roster-pill span { color: var(--text2); margin-right: 4px; }

  /* TEAM DETAIL PANEL */
  .detail-panel {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; margin-top: 24px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 20px;
  }
  .detail-abbr {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 56px; font-weight: 900;
    line-height: 1; letter-spacing: -0.02em;
  }
  .detail-info h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 700;
  }
  .detail-info p { color: var(--text3); font-size: 13px; margin-top: 3px; }
  .detail-caps {
    margin-left: auto; display: flex; gap: 24px;
  }
  .detail-cap-item { text-align: right; }
  .detail-cap-val {
    font-family: 'Space Mono', monospace;
    font-size: 18px; font-weight: 700;
  }
  .detail-cap-lbl {
    font-size: 11px; color: var(--text3);
    font-family: 'Barlow Condensed', sans-serif;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .close-btn {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text3); cursor: pointer; width: 32px; height: 32px;
    border-radius: 3px; font-size: 16px; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.15s; margin-left: 16px;
  }
  .close-btn:hover { color: var(--text); border-color: var(--text3); }

  /* CONTRACTS TABLE */
  .contracts-wrap { padding: 0 0 16px; }
  .contracts-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 24px; gap: 0;
  }
  .ctab {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text3);
    padding: 12px 16px; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s;
  }
  .ctab:hover { color: var(--text); }
  .ctab.active { color: var(--ice); border-bottom-color: var(--ice); }
  .contracts-table { width: 100%; border-collapse: collapse; }
  .contracts-table thead tr {
    border-bottom: 1px solid var(--border);
  }
  .contracts-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text3);
    padding: 10px 16px; text-align: left; cursor: pointer;
    white-space: nowrap; user-select: none;
  }
  .contracts-table th:hover { color: var(--text2); }
  .contracts-table th.num, .contracts-table td.num { text-align: right; }
  .contracts-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .contracts-table tbody tr:hover { background: var(--bg3); }
  .contracts-table td {
    padding: 10px 16px; font-size: 13px;
  }
  .player-name {
    font-weight: 500; color: var(--text);
  }
  .player-pos {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--text3);
    margin-left: 8px;
  }
  .contract-type {
    font-size: 10px; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 2px;
  }
  .cap-category {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 2px;
    border: 1px solid var(--border2);
    color: var(--text2);
    background: rgba(255,255,255,0.03);
  }
  .cap-category.active { background: rgba(61,220,132,0.1); color: var(--green); border-color: rgba(61,220,132,0.3); }
  .cap-category.ir { background: rgba(245,200,66,0.1); color: var(--yellow); border-color: rgba(245,200,66,0.3); }
  .cap-category.ltir { background: rgba(232,69,69,0.1); color: var(--red); border-color: rgba(232,69,69,0.3); }
  .cap-category.minors,
  .cap-category.reserve,
  .cap-category.nonRoster { background: rgba(91,200,245,0.1); color: var(--ice); border-color: rgba(91,200,245,0.3); }
  .type-ufa { background: rgba(91,200,245,0.1); color: var(--ice); border: 1px solid var(--ice3); }
  .type-rfa { background: rgba(61,220,132,0.1); color: var(--green); border: 1px solid rgba(61,220,132,0.3); }
  .type-elc { background: rgba(165,100,255,0.1); color: #b47fff; border: 1px solid rgba(165,100,255,0.3); }
  .type-lp  { background: rgba(245,200,66,0.1); color: var(--yellow); border: 1px solid rgba(245,200,66,0.3); }
  .type-ex  { background: rgba(232,69,69,0.1); color: var(--red); border: 1px solid rgba(232,69,69,0.3); }
  .mono { font-family: 'Space Mono', monospace; font-size: 12px; }
  .cap-pct {
    font-size: 11px; color: var(--text3); margin-left: 4px;
  }
  .high-cap { color: var(--red); }
  .med-cap { color: var(--yellow); }
  .low-cap { color: var(--text2); }
  .empty-state {
    padding: 18px 24px; color: var(--text3); font-size: 12px;
  }

  /* STANDINGS VIEW */
  .standings-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
  }
  .standings-conf-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
  }
  .standings-division {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .standings-div-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .standings-div-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text);
  }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text3);
    padding: 7px 10px; border-bottom: 1px solid var(--border);
    white-space: nowrap; user-select: none;
  }
  .standings-table th.snum { text-align: right; }
  .standings-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .standings-table td.snum {
    font-family: 'Space Mono', monospace; font-size: 11px;
    text-align: right; color: var(--text2);
  }
  .standings-table td.std-pts {
    font-family: 'Space Mono', monospace; font-size: 12px;
    font-weight: 700; text-align: right; color: var(--text);
  }
  .standings-table tbody tr:last-child td { border-bottom: none; }
  .standings-table tbody tr:hover { background: var(--bg3); }
  .std-team-cell { display: flex; align-items: center; gap: 8px; min-width: 150px; }
  .std-team-bar { width: 3px; height: 20px; border-radius: 1px; flex-shrink: 0; }
  .std-abbr {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: 0.02em; min-width: 34px;
  }
  .std-name { font-size: 12px; color: var(--text2); }
  .wc-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
    padding: 1px 5px; border-radius: 2px;
    background: rgba(245,200,66,0.12);
    border: 1px solid rgba(245,200,66,0.4);
    color: var(--yellow); flex-shrink: 0;
  }
  .playoff-cutoff-row td { border-top: 1px dashed rgba(91,200,245,0.35) !important; }
  .standings-table tbody tr.row-selected td { background: var(--ice-dim); border-color: var(--border2); }
  .no-standings { padding: 20px 14px; color: var(--text3); font-size: 12px; text-align: center; }

  /* PROJECTIONS VIEW */
  .proj-controls { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .proj-team-select {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
    padding: 5px 12px; border-radius: 3px; outline: none; cursor: pointer;
  }
  .proj-grid { display: flex; flex-direction: column; gap: 10px; }
  .proj-season-row {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .proj-season-header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
  }
  .proj-season-label {
    font-family: 'Space Mono', monospace; font-size: 12px;
    color: var(--ice); min-width: 64px;
  }
  .proj-cap-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text3); margin-left: auto;
  }
  .proj-cap-val {
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text2);
    min-width: 60px; text-align: right;
  }
  .proj-bar-row { padding: 10px 16px 12px; display: flex; flex-direction: column; gap: 6px; }
  .proj-team-bar-wrap { display: flex; align-items: center; gap: 10px; }
  .proj-team-tag {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 13px; min-width: 36px;
  }
  .proj-bar-track {
    flex: 1; height: 18px; background: var(--bg4);
    border-radius: 3px; overflow: hidden; position: relative;
  }
  .proj-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.4s ease;
    display: flex; align-items: center; padding-left: 6px;
  }
  .proj-bar-fill-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: rgba(0,0,0,0.7); white-space: nowrap; overflow: hidden;
  }
  .proj-space-val {
    font-family: 'Space Mono', monospace; font-size: 11px;
    min-width: 68px; text-align: right;
  }
  .proj-projected-badge {
    font-family: 'Barlow Condensed', sans-serif; font-size: 9px;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 1px 5px; border-radius: 2px;
    background: rgba(245,200,66,0.12); border: 1px solid rgba(245,200,66,0.4);
    color: var(--yellow);
  }
  .proj-expiry-row {
    padding: 0 16px 10px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .proj-expiry-pill {
    font-size: 10px; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; letter-spacing: 0.04em;
    padding: 2px 7px; border-radius: 2px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text3);
  }
  .proj-expiry-pill span { color: var(--text2); margin-right: 3px; }
  .proj-expiry-label {
    font-size: 10px; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text3); align-self: center;
  }

  /* TRADE TOOL */
  .trade-layout { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: start; }
  .trade-panel {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .trade-panel-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .trade-panel-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text);
  }
  .trade-team-select {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
    padding: 4px 10px; border-radius: 3px; outline: none; cursor: pointer;
    flex: 1;
  }
  .trade-roster-list { max-height: 460px; overflow-y: auto; }
  .trade-player-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s; user-select: none;
  }
  .trade-player-row:last-child { border-bottom: none; }
  .trade-player-row:hover { background: var(--bg3); }
  .trade-player-row.selected { background: rgba(91,200,245,0.08); border-left: 2px solid var(--ice); padding-left: 14px; }
  .trade-player-check {
    width: 16px; height: 16px; border: 1px solid var(--border2);
    border-radius: 2px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--ice);
    transition: all 0.1s;
  }
  .trade-player-row.selected .trade-player-check {
    background: var(--ice-dim); border-color: var(--ice3);
  }
  .trade-player-name { flex: 1; font-size: 13px; color: var(--text); }
  .trade-player-pos {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text3);
    min-width: 22px; text-align: center;
  }
  .trade-player-cap {
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text2);
    min-width: 60px; text-align: right;
  }
  .trade-player-yrs {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text3);
    min-width: 30px; text-align: right;
  }
  .trade-middle {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; padding-top: 56px;
  }
  .trade-arrow {
    font-size: 24px; color: var(--text3);
  }
  .trade-btn {
    background: var(--ice-dim); border: 1px solid var(--ice3);
    color: var(--ice); font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 8px 20px; border-radius: 3px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .trade-btn:hover { background: rgba(91,200,245,0.15); }
  .trade-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .trade-btn.reset { background: var(--bg3); border-color: var(--border2); color: var(--text3); }
  .trade-btn.reset:hover { color: var(--text); border-color: var(--text3); }
  .trade-cap-summary {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; margin-top: 16px; overflow: hidden;
  }
  .trade-summary-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text);
  }
  .trade-summary-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  }
  .trade-summary-team {
    padding: 16px 20px;
  }
  .trade-summary-team:first-child { border-right: 1px solid var(--border); }
  .trade-summary-abbr {
    font-family: 'Barlow Condensed', sans-serif; font-size: 22px;
    font-weight: 900; margin-bottom: 12px;
  }
  .trade-summary-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px; font-size: 12px;
  }
  .trade-summary-lbl { color: var(--text3); font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; font-size: 11px; }
  .trade-summary-val { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text2); }
  .trade-summary-val.green { color: var(--green); }
  .trade-summary-val.red { color: var(--red); }
  .trade-summary-val.yellow { color: var(--yellow); }
  .trade-selected-players {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .trade-selected-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
    font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3);
    margin-bottom: 6px;
  }
  .trade-selected-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text); padding: 3px 0;
  }
  .trade-selected-pill-pos {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text3);
  }
  .trade-selected-pill-cap {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--ice);
    margin-left: auto;
  }
  .trade-empty-state {
    padding: 24px; text-align: center; color: var(--text3); font-size: 12px;
  }
  .trade-valid-badge {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px;
  }
  .trade-valid-badge.ok { background: rgba(61,220,132,0.1); border: 1px solid rgba(61,220,132,0.3); color: var(--green); }
  .trade-valid-badge.warn { background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.3); color: var(--yellow); }
  .trade-valid-badge.err { background: rgba(232,69,69,0.1); border: 1px solid rgba(232,69,69,0.3); color: var(--red); }

  /* LOADING + ERROR */
  .loading-state, .error-state {
    max-width: 800px; margin: 80px auto; padding: 24px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; text-align: center;
  }
  .loading-state h2, .error-state h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .error-state p { color: var(--text3); }
</style>
</head>

<div id="root"></div>
<script src="app.js"></script>
</body>
