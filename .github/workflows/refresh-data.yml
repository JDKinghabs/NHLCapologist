name: Refresh cap data

# Re-scrapes Spotrac and commits an updated data/nhl-cap-data.json.
# The commit (pushed to main) triggers the Cloudflare Pages redeploy.

on:
  schedule:
    # Daily at 09:00 UTC. Cron is UTC; adjust if you want a different local time.
    - cron: "0 9 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

# Avoid overlapping refresh runs racing on the same file.
concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write # needed to push the refreshed JSON

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh data from Spotrac
        run: node scripts/refresh-data.js

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain data/nhl-cap-data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/nhl-cap-data.json
            git commit -m "chore(data): refresh cap data ($(date -u +%Y-%m-%d))"
            git push
            echo "Pushed refreshed cap data."
          else
            echo "No data changes — nothing to commit."
          fi
